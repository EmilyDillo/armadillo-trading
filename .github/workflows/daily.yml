name: Armadillo daily cycle
on:
  schedule:
    - cron: '35 13 * * 1-5'   # 9:35 AM ET
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  cycle:
    runs-on: ubuntu-latest
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python run_cycle.py || echo "cycle failed — deploying fallback"
      - name: Publish dashboard to gh-pages
        run: |
          mkdir -p /tmp/site
          cp dashboard.html /tmp/site/index.html 2>/dev/null || cp fallback.html /tmp/site/index.html
          cd /tmp/site
          git init -b gh-pages
          git config user.name "armadillo-bot"
          git config user.email "actions@github.com"
          git add -A && git commit -m "daily dashboard $(date -u +%F)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
