name: Armadillo daily cycle
on:
  schedule:
    - cron: '35 13 * * 1-5'         # TRADING run — 13:35 UTC (~9:35 AM ET), once per weekday
    - cron: '7,22,37,52 13-21 * * 1-5'  # refresh-only — every 15 min through the trading day (no orders)
  workflow_dispatch: {}              # manual run — refresh-only (never trades)
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: armadillo-pages
  cancel-in-progress: false
jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ARMADILLO_TRADE: ${{ github.event.schedule == '35 13 * * 1-5' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run cycle (trade only on the 13:35 UTC schedule; never fails the job)
        run: |
          echo "ARMADILLO_TRADE=$ARMADILLO_TRADE"
          python run_cycle.py || echo "cycle errored — fallback dashboard will publish"

      - name: Keep-alive heartbeat commit (resets GitHub's 60-day inactivity timers)
        if: always() && (env.ARMADILLO_TRADE == '1' || github.event_name == 'workflow_dispatch')
        run: |
          git config user.name "armadillo-bot"
          git config user.email "actions@github.com"
          date -u +"%Y-%m-%d %H:%M UTC" > .last-cycle
          git add .last-cycle
          git commit -m "heartbeat $(date -u +%F) [skip ci]" || true
          git pull --rebase origin main || true
          git push || echo "heartbeat push failed (non-fatal)"

      - name: Assemble site (fresh dashboard, else static fallback)
        if: always()
        run: |
          mkdir -p _site
          if [ -f dashboard.html ]; then
            cp dashboard.html _site/index.html
            echo "PUBLISH: fresh dashboard"
          else
            cp fallback.html _site/index.html
            echo "PUBLISH: static fallback (cycle produced no dashboard)"
          fi

      - name: Configure Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
